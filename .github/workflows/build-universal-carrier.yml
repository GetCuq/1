name: Build and publish olcrtc binaries

# Triggers:
#  - manually via Actions UI (workflow_dispatch)
#  - every day at 03:00 UTC — skips commit if binaries haven't changed
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  # ── 1. Build amd64 and arm64 in parallel ─────────────────────────────────
  build:
    name: Build ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout openlibrecommunity/olcrtc
        uses: actions/checkout@v4
        with:
          repository: openlibrecommunity/olcrtc
          ref: refactor/universal-carrier

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o olcrtc-linux-${{ matrix.goarch }} \
            ./cmd/olcrtc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: olcrtc-linux-${{ matrix.goarch }}
          path: olcrtc-linux-${{ matrix.goarch }}
          if-no-files-found: error

  # ── 2. Push binaries + updated manifest.json to GetCuq/1 ─────────────────
  publish:
    name: Publish to GetCuq/1
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout GetCuq/1
        uses: actions/checkout@v4
        with:
          repository: GetCuq/1
          token: ${{ secrets.DIST_REPO_TOKEN }}
          ref: master

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: olcrtc-linux-amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: olcrtc-linux-arm64

      - name: Get upstream commit SHA
        id: upstream
        run: |
          git clone --depth 1 --branch refactor/universal-carrier \
            https://github.com/openlibrecommunity/olcrtc.git _upstream
          echo "sha=$(git -C _upstream rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          rm -rf _upstream

      - name: Update manifest.json
        run: |
          ARM64=$(sha256sum olcrtc-linux-arm64 | awk '{print $1}')
          AMD64=$(sha256sum olcrtc-linux-amd64  | awk '{print $1}')
          REV="${{ steps.upstream.outputs.sha }}"

          jq --arg arm64 "$ARM64" \
             --arg amd64 "$AMD64" \
             --arg rev   "$REV"   \
            '
              .binary_sha256.arm64  = $arm64 |
              .binary_sha256.amd64  = $amd64 |
              .binary_revision      = $rev
            ' manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json manifest.json

      - name: Commit and push
        run: |
          chmod 755 olcrtc-linux-arm64 olcrtc-linux-amd64
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add olcrtc-linux-arm64 olcrtc-linux-amd64 manifest.json
          git diff --cached --quiet \
            && echo "Binaries unchanged — nothing to push." \
            && exit 0
          git commit -m "chore: update olcrtc binaries (upstream ${{ steps.upstream.outputs.sha }})"
          git push
