name: Build and publish olcrtc binaries

# Triggers:
#  - every hour: check job does a fast git ls-remote (no clone needed),
#    build only starts if upstream commit changed vs manifest.json
#  - manual via Actions UI: always builds regardless of SHA
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'   # every hour

permissions:
  contents: write

jobs:
  # ── 1. Fast upstream change detection (no clone, ~1 sec) ─────────────────
  check:
    name: Check for upstream changes
    runs-on: ubuntu-latest
    outputs:
      needs_build:  ${{ steps.cmp.outputs.needs_build }}
      upstream_sha: ${{ steps.cmp.outputs.upstream_sha }}

    steps:
      - name: Checkout GetCuq/1
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Compare upstream SHA vs manifest.json
        id: cmp
        run: |
          UPSTREAM_SHA=$(git ls-remote \
            https://github.com/openlibrecommunity/olcrtc.git \
            refs/heads/master \
            | awk '{print $1}')

          if [ -z "$UPSTREAM_SHA" ]; then
            echo "Failed to resolve upstream master SHA" >&2
            exit 1
          fi

          STORED_REV=$(jq -r '.binary_revision // ""' manifest.json)

          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

          if [ "$UPSTREAM_SHA" = "$STORED_REV" ]; then
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "Up to date — upstream=$UPSTREAM_SHA"
          else
            echo "needs_build=true"  >> $GITHUB_OUTPUT
            echo "Change detected: $STORED_REV -> $UPSTREAM_SHA"
          fi

  # ── 2. Build amd64 and arm64 in parallel ─────────────────────────────────
  build:
    name: Build ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout openlibrecommunity/olcrtc
        uses: actions/checkout@v4
        with:
          repository: openlibrecommunity/olcrtc
          ref: master
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o olcrtc-linux-${{ matrix.goarch }} \
            ./cmd/olcrtc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: olcrtc-linux-${{ matrix.goarch }}
          path: olcrtc-linux-${{ matrix.goarch }}
          if-no-files-found: error

  # ── 3. Push binaries + updated manifest.json to GetCuq/1 ─────────────────
  publish:
    name: Publish to GetCuq/1
    runs-on: ubuntu-latest
    needs: [check, build]
    if: needs.check.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout GetCuq/1
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: olcrtc-linux-amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: olcrtc-linux-arm64

      - name: Update manifest.json and install.sh
        run: |
          ARM64=$(sha256sum olcrtc-linux-arm64 | awk '{print $1}')
          AMD64=$(sha256sum olcrtc-linux-amd64  | awk '{print $1}')
          REV="${{ needs.check.outputs.upstream_sha }}"
          DATE=$(date +%Y.%m.%d)
          SHORT=$(echo "$REV" | cut -c1-7)

          jq --arg arm64 "$ARM64" \
             --arg amd64 "$AMD64" \
             --arg rev   "$REV"   \
             --arg date  "$DATE"  \
            '
              .binary_sha256.arm64 = $arm64 |
              .binary_sha256.amd64 = $amd64 |
              .binary_revision     = $rev   |
              .binary_date         = $date
            ' manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json manifest.json

          # Keep BINARY_REVISION in install.sh in sync
          sed -i "s|^BINARY_REVISION=.*|BINARY_REVISION=\"${SHORT}\"|" install.sh

      - name: Commit and push
        run: |
          chmod 755 olcrtc-linux-arm64 olcrtc-linux-amd64
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add olcrtc-linux-arm64 olcrtc-linux-amd64 manifest.json
          git diff --cached --quiet \
            && echo "Binaries unchanged — nothing to push." \
            && exit 0
          SHORT=$(echo "${{ needs.check.outputs.upstream_sha }}" | cut -c1-7)
          git commit -m "chore: update olcrtc binaries (upstream ${SHORT})"
          git push
